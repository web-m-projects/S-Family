<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة متجاوبة وموزونة</title>
    <style>
        /* إعدادات الشاشة الأساسية والتخلص من الفراغات */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            overflow-x: hidden; /* منع التمرير الأفقي المزعج وحماية أطراف الشاشة */
        }

        /* تنسيق النص ليصبح أكبر وحجمه عريض ومتوافق مع الجوال */
        .header-text {
            font-size: clamp(1.4rem, 4vw, 2.2rem); /* تكبير ذكي يتناسق تلقائياً بين اللابتوب والجوال */
            font-weight: 900;  /* جعل النص عريضاً جداً Bold */
            color: #111;       /* تعميق اللون الأسود ليصبح أكثر وضوحاً */
            margin: 20px 15px 10px 15px;
            text-align: center;
            line-height: 1.4;  /* إعطاء مسافة مريحة بين الأسطر عند انقسام النص في الجوال */
            width: 90%;        /* ضمان عدم التصاق الحروف بجوانب الشاشات الصغيرة */
        }

        /* حاوية الرابط والصورة لضبط المساحة المتبقية */
        .image-link {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            margin-bottom: 15px;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* ضبط الصورة الحساس لكي تظهر بالكامل دون اختفاء الحواف على أي جهاز */
        .responsive-img {
            max-width: 100%;
            height: auto;
            max-height: 70vh; /* تحديد الارتفاع بدقة لتوفير مساحة كافية للنص المكبر */
            object-fit: contain; /* تضمن ظهور الصورة كاملة داخل الإطار دون اقتطاع حوافها */
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header-text">أهلاً بك، للدخول للموقع التعريفي لقبيلة السراحين الرجاء الضغط على زر التشغيل</div>

    <a href="https://alsarahin.netlify.app/" target="_blank" class="image-link">
        <img src="lounch.png" alt="اضغط هنا للانتقال للموقع" class="responsive-img">
    </a>

</body>
</html>
